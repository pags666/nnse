name: Update Sheets

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create service account file
        run: |
          printf "%s" '${{ secrets.GCP_SA_KEY }}' > service_account.json

      - name: Run NSE
        run: python NNSE.py

      - name: Run BSE
        run: python BSE.py